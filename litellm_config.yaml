# LiteLLM Proxy Config — 免费 LLM API 统一网关
# 文档: https://docs.litellm.ai/docs/providers

model_list:

  # === Google Gemini (免费) ===
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini/gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # === Mistral AI (免费) ===
  - model_name: mistral/mistral-small-latest
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral/mistral-medium-latest
    litellm_params:
      model: mistral/mistral-medium-latest
      api_key: os.environ/MISTRAL_API_KEY

  # === Groq (免费) ===
  - model_name: groq/llama-3.3-70b-versatile
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq/llama-3.1-8b-instant
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq/deepseek-r1-distill-llama-70b
    litellm_params:
      model: groq/deepseek-r1-distill-llama-70b
      api_key: os.environ/GROQ_API_KEY

  # === Cerebras (免费) ===
  - model_name: cerebras/llama3.3-70b
    litellm_params:
      model: cerebras/llama3.3-70b
      api_key: os.environ/CEREBRAS_API_KEY

  # === Cohere (免费) ===
  - model_name: cohere/command-a
    litellm_params:
      model: cohere/command-a
      api_key: os.environ/COHERE_API_KEY

  - model_name: cohere/command-r
    litellm_params:
      model: cohere/command-r
      api_key: os.environ/COHERE_API_KEY

  # === OpenRouter (有免费模型) ===
  - model_name: openrouter/meta-llama/llama-3.1-8b-instruct:free
    litellm_params:
      model: openrouter/meta-llama/llama-3.1-8b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter/google/gemma-3-27b-it:free
    litellm_params:
      model: openrouter/google/gemma-3-27b-it:free
      api_key: os.environ/OPENROUTER_API_KEY

  # === Zhipu AI (智谱, 免费) ===
  - model_name: zhipu/glm-4-flash
    litellm_params:
      model: zhipu/glm-4-flash
      api_key: os.environ/ZHIPU_API_KEY

litellm_settings:
  # 全局设置
  drop_params: true
  set_verbose: false
